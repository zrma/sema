name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - run: scripts/check.sh

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: scripts/check-container.sh
