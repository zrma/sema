schema_version: 1
module: github.com/zrma/sema
license: LICENSE
entrypoint: docs/HANDOFF.md
agent_harness: docs/agent-harness.md
status: docs/status.md
roadmap: docs/roadmap.md
architecture: docs/architecture.md
lab: cmd/sema-lab
lab_guide: docs/sema-lab.md
workload_evaluation: docs/workload-evaluation.md
evaluation_baseline: docs/evaluation-baseline.md
domain_model: docs/domain-model.md
lifecycle: docs/lifecycle.md
reference_scenarios: docs/reference-scenarios.md
runtime_validation: docs/runtime-validation.md
policy_simulation: docs/policy-simulation.md
implementation_decision: docs/decisions/0001-implementation-baseline.md
runtime_adapter_decision: docs/decisions/0002-runtime-adapter-baseline.md
policy_identity_decision: docs/decisions/0003-policy-identity.md
policy_catalog_decision: docs/decisions/0004-policy-catalog.md
integration_publication_decision: docs/decisions/0005-integration-publication-baseline.md
development_sequence_decision: docs/decisions/0006-product-development-sequence.md
evaluation_calibration_decision: docs/decisions/0007-evaluation-calibration-baseline.md
active_work_glob: docs/todo-*/spec.md

checks:
  full: scripts/check.sh
  go_format: gofmt
  go_static_analysis: go vet ./...
  go_test: go test ./...
  go_race: go test -race ./...
  planner_benchmark: go test ./internal/planner -run ^$ -bench ^BenchmarkPlan
  engine_benchmark: go test ./internal/engine -run ^$ -bench ^BenchmarkEngine
  lab_test: go test ./internal/lab ./cmd/sema-lab
  evaluation_test: go test ./internal/evaluation
  lab_smoke: go run ./cmd/sema-lab
  harness: scripts/check-agent-harness-interface.sh
  publication: scripts/check-publication-boundary.py

vcs:
  local: jj
  change_message: "<type>: <summary>"
  push_requires_explicit_permission: true

publication:
  class: public
  public_transition_requires_live_visibility_check: true
  public_push_requires_machine_local_inventory_gate: true
