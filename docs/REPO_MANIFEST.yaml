checks:
  full: scripts/check.sh
  go_format: gofmt
  go_static_analysis: go vet ./...
  go_test: go test ./...
  go_race: go test -race ./...
  planner_benchmark: go test ./internal/planner -run ^$ -bench ^BenchmarkPlan
  engine_benchmark: go test ./internal/engine -run ^$ -bench ^BenchmarkEngine
  lab_test: go test ./internal/lab ./cmd/sema-lab
  evaluation_test: go test ./internal/evaluation
  discovery_test: go test ./internal/discovery
  repository_test: go test -race ./internal/repository/...
  repository_memory_benchmark: go test ./internal/repository -run ^$ -bench ^BenchmarkMemoryRepository$ -benchtime=100x -count=3
  repository_file_prototype_benchmark: go test ./internal/repository/fileprototype -run ^$ -bench ^BenchmarkFilePrototypeRepository$ -benchtime=100x -count=3
  postgres_repository_test: scripts/check-postgres.sh
  alpha_test: go test ./alpha
  example_consumer: go run ./examples/compose
  release_build: scripts/check-release-build.sh
  durable_test: go test ./internal/durable
  durable_replay_benchmark: go test ./internal/durable -run ^$ -bench ^BenchmarkOpenReplay$ -benchtime=1x
  service_test: go test ./internal/httpapi ./cmd/sema-server
  service_smoke: go run ./cmd/sema-server -version
  observability_test: go test ./internal/observability ./internal/httpapi ./internal/durable
  operational_validation_test: go test ./internal/operational ./cmd/sema-ops-check
  operational_validation_smoke: go run ./cmd/sema-ops-check -cycles 1 -tickets-per-cycle 20 -concurrency 4 -timeout 30s
  healthcheck_test: go test ./cmd/sema-healthcheck
  container: scripts/check-container.sh
  performance_unit: go test ./internal/performance ./cmd/sema-benchmark-gate
  performance: scripts/check-performance.sh
  release_admission: scripts/check-release-admission.sh v0.0.0-test
  flow_tui_test: go test ./internal/league ./internal/flow ./internal/flowui ./cmd/sema-tui
  flow_tui_snapshot: go run ./cmd/sema-tui -snapshot -steps 100 -width 120 -height 38
  flow_measurement_test: go test ./internal/flow ./cmd/sema-flow-report
  flow_measurement_smoke: go run ./cmd/sema-flow-report -duration 60s -population 40 -game-duration 20s -max-return-delay 10s -format json
  flow_capacity_matrix_test: go test ./internal/flowmatrix ./cmd/sema-flow-matrix
  flow_capacity_matrix_smoke: go run ./cmd/sema-flow-matrix -duration 3s -population 40 -seeds 42,43 -batches 1,2 -parallel 2 -game-duration 20s -arrival-interval 100ms -planning-interval 1s -max-return-delay 10s -format json
  planner_large_benchmark: go test ./internal/planner -run ^$ -bench ^BenchmarkPlanLargeQueues$ -benchtime=1x -count=1
  lab_smoke: go run ./cmd/sema-lab
  harness: scripts/check-agent-harness-interface.sh
  publication: scripts/check-publication-boundary.py

vcs:
  local: jj
  change_message: "<type>: <summary>"
  push_requires_explicit_permission: true

publication:
  class: public
  public_transition_requires_live_visibility_check: true
  public_push_requires_machine_local_inventory_gate: true

release:
  alpha_admitted: true
  stable_admitted: false
