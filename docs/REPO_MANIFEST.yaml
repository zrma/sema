schema_version: 1
entrypoint: docs/HANDOFF.md
agent_harness: docs/agent-harness.md
status: docs/status.md
roadmap: docs/roadmap.md
architecture: docs/architecture.md
active_work_glob: docs/todo-*/spec.md

checks:
  full: scripts/check.sh
  harness: scripts/check-agent-harness-interface.sh
  publication: scripts/check-publication-boundary.py

vcs:
